function resolveAsset(KB,hint,line){
  const h=(hint||"").toLowerCase(), nh=normalize(hint);
  let best=null,bs=0,note=[];
  const lineNum=((line||"")+" "+(hint||"")).match(/\b(\d{1,2})\b/);

      if((tok==="filler"||tok==="fill")&&a.funcloc.includes("FILL"))sc+=0.4;

function ev(source,plane,claim,trust,conf,cite,asserts){_eid++;return{
  evidence_id:"EV-"+_eid,source_system:source,plane,claim,trust,confidence:conf,
  citation:{locator:cite||""},tags:asserts?{asserts_cause:asserts}:{},weight:+(trust*conf).toFixed(4)};}

function makeTools(KB,a){
  const T=KB.trust;
  return {
    read_timeline:()=>a.historian.map(s=>{
      let asserts=null; if(/high head pressure|low flow/.test(s.signal))asserts="Nozzle clog";
      else if(/pump wear/.test(s.signal))asserts="Pump wear";
      const stale=s.stale?` [${s.stale} stale pts — evidence not gospel]`:"";
      return ev("HISTORIAN","OT_OPS",`Tag ${s.tag} (${s.meaning}) ${s.baseline}->${s.peak}/${s.trough} ${s.uom}: ${s.signal}${stale}`,T.HISTORIAN,s.conf,`historian:${s.tag}`,asserts);}),
    read_maintenance_history:()=>{const out=[];const c=a.cmms;
      if(c.top_cause)out.push(ev("CMMS","IT_BUSINESS",`CMMS: '${c.top_cause}' is the recurring fault on ${a.funcloc} (${c.count}/${c.n_wo} WOs) — strong MTBF signal`,T.CMMS,Math.min(0.9,0.4+c.count/40),"work_orders.csv",c.top_cause));
      (c.conflicts||[]).forEach(cf=>out.push(ev("CMMS","IT_BUSINESS",`CMMS data conflict: ${cf.wo_id} logged with contradictory causes ${JSON.stringify(cf.causes)}`,T.CMMS,0.5,cf.wo_id,cf.causes[0])));
      return out;},
    search_manual:()=>{const m=KB.manuals[a.model]; if(!m||!m["7.4"])return [];
      return [ev("MANUAL","IT_BUSINESS",`Manual ${a.model} §7.4 (p.${m["7.4"].page}): alarm A-220 -> probable nozzle clog; procedure cited`,T.MANUAL,0.9,m["7.4"].cite,"Nozzle clog")];},
    check_recent_changes:()=>a.moc.map(mc=>{const visc=/viscosity/i.test(mc.change);
      return ev("MOC","IT_BUSINESS",`Recent change ${mc.id} (${mc.date}): ${mc.change} [risk_review=${mc.risk}]`,T.MOC,mc.risk==="pending"?0.6:0.35,mc.id,visc?"Viscosity (new lot)":null);}),
    check_parts:()=>a.parts.map(p=>ev("PARTS","IT_BUSINESS",`Part ${p.part_no} (${p.desc}): ${p.on_hand} on hand, bin ${p.bin}, lead ${p.lead}d`,T.PARTS,0.88,p.part_no,null)),
    check_safety_loto:()=>a.safety?[ev("SAFETY","IT_BUSINESS",`LOTO procedure ${a.safety.procedure} exists; permit ${a.safety.permit?"REQUIRED":"not required"}`,T.SAFETY,0.97,a.safety.procedure,null)]:[],
    check_labor:()=>[ev("CMMS","IT_BUSINESS","Qualified filler tech (jmartin, LOTO-cert) on shift now; 1 available",T.CMMS,0.7,"rota",null)],
    search_shift_notes:()=>a.shift.map(n=>ev("SHIFT_NOTES","IT_BUSINESS",`Shift note ${n.file}: tribal-knowledge lead (low trust) — "${(n.text.split("\n\n").pop()||"").slice(0,90)}"`,T.SHIFT_NOTES,0.5,n.file,"Nozzle clog")),
    read_production_econ:()=>[ev("MES","OT_OPS",`Line ${a.line} bleeds downtime cost while down; prior downtime events on ${a.mes_id}`,T.MES,0.75,"oee_daily.csv",null)],
    scan_ot_security:()=>KB.security.map(f=>ev("SAFETY","IT_BUSINESS",`OT-security finding in ${f.file}:${f.line} — ${f.issue} (${f.detail})`,T.SAFETY,0.9,`${f.file}:${f.line}`,null)),
  };
}

// ---- adaptive policy (offline) -- reacts to evidence; not a fixed list
function policy(called,graph){
  const base=["read_timeline","read_maintenance_history"];
  for(const t of base)if(!called.has(t))return {action:t,why:"establish what happened + maintenance history"};
  const clog=graph.some(e=>/clog|high head pressure|low flow|below baseline/i.test(e.claim)||/nozzle clog/i.test(JSON.stringify(e.tags)));
  const path=clog?["search_manual","check_parts","check_safety_loto","check_labor"]:["check_recent_changes","search_shift_notes","read_production_econ"];
  for(const t of path)if(!called.has(t))return {action:t,why:clog?"clog signature seen -> confirm procedure, parts, safety":"no clear signature -> broaden the search"};
  for(const t of ["scan_ot_security","check_recent_changes","search_shift_notes","read_production_econ","search_manual","check_parts","check_safety_loto","check_labor"])
    if(!called.has(t))return {action:t,why:"complete coverage before deciding"};
  return {action:"diagnose",why:"enough evidence gathered"};
}

function diagnose(graph,negatives){
  const ranked=Object.entries(CAUSES).map(([cause,meta])=>{
    let supporting=[],score=0;
    for(const e of graph){const hay=(e.claim+" "+JSON.stringify(e.tags)).toLowerCase();
      const sig=meta.signals.some(s=>hay.includes(s));
      if(e.tags.asserts_cause===cause||sig){ if(meta.systems.includes(e.source_system)||e.tags.asserts_cause===cause){supporting.push(e.evidence_id);score+=e.weight;}}}
    let pen=(negatives||[]).reduce((p,n)=>p+(cause.toLowerCase().includes(n.toLowerCase())?0.4:0),0);
    return {cause,iso14224_code:meta.iso,supporting,score:Math.max(0,score-pen),would_change_my_mind:meta.falsifier};});
  const total=ranked.reduce((s,r)=>s+r.score,0)||1;
  ranked.forEach(r=>r.confidence=+(r.score/total).toFixed(2));
  ranked.sort((x,y)=>y.confidence-x.confidence);
  return ranked;
}

function buildPlan(KB,a,injectHall){
  const m=KB.manuals[a.model]; const steps=[];
  if(m&&m["7.4"]) m["7.4"].steps.forEach(s=>steps.push({n:s.n,text:s.text,loto_required:s.loto,part_numbers:s.parts,citation:{locator:s.cite,resolved:false}}));
  if(injectHall)steps.push({n:steps.length+1,text:"Recalibrate per Manual §7.4 p.212",loto_required:false,part_numbers:[],citation:{locator:"MANUAL:Acme_Model_8200.md#7.4@p.212",resolved:false}});
  const parts=[]; const seen=new Set();
  steps.forEach(s=>s.part_numbers.forEach(pn=>{if(!seen.has(pn)){seen.add(pn);const p=KB.parts_catalog[pn];if(p)parts.push(p);}}));
  if(!parts.length&&KB.parts_catalog["8200-NZ"])parts.push(KB.parts_catalog["8200-NZ"]);
  const risk=steps.some(s=>s.loto_required)?"LOTO_PHYSICAL":"WORK_ORDER_DRAFT";
  return {steps,parts,risk,est_minutes:45,techs:1};
}

function verify(KB,a,plan){
  const m=KB.manuals[a.model]; const pages=m?m.pages:{};
  let cited=0,resolved=0,refutations=[],halluc=[];
  for(const s of plan.steps){ if(s.citation&&s.citation.locator){cited++;
    // parse #sec@p.N
    let ok=false; const mm=s.citation.locator.match(/#([\w.]+)@p\.(\d+)/);
    if(mm){const sec=mm[1],page=+mm[2]; ok=(pages[sec]===page);}
    s.citation.resolved=ok; if(ok)resolved++; else refutations.push(`Step ${s.n}: citation '${s.citation.locator}' does NOT resolve to a real manual passage — blocked.`);}
    for(const pn of s.part_numbers){ if(!KB.parts_catalog[pn]){halluc.push(pn);refutations.push(`Step ${s.n}: part '${pn}' not in inventory.`);} }
  }
  const rate=cited?resolved/cited:0;
  const passed=refutations.length===0&&rate>=0.999&&halluc.length===0;
  return {grounded:passed,citation_resolution_rate:+rate.toFixed(3),hallucinated_parts:halluc,refutations,verifier_model:"offline-cross-check (different model with API key)",passed};
}

function safetyCheck(a,plan){
  const physical=plan.risk==="LOTO_PHYSICAL"; const lotoStep=plan.steps.some(s=>s.loto_required);
  const notes=[]; let passed=true;
  if(physical&&!lotoStep){notes.push("Physical work planned but no LOTO step — FAIL.");passed=false;}
  if(a.safety&&a.safety.permit)notes.push("HOT-PRODUCT permit may be required (temp-dependent).");
  if(passed)notes.push("LOTO present, no safety-section contradiction, permits accounted for.");
  return {passed,loto_present:!!a.safety,notes};
}

function gate(risk,conf,rate,safetyPass,verPass,autoApprove){
  const base={WORK_ORDER_DRAFT:0.55,PARTS_RESERVE:0.6,LOTO_PHYSICAL:0.7,RECIPE_CHANGE:0.8,LINE_RESTART:0.75}[risk]||0.6;
  const factor=Math.max(0.6,Math.min(1.0,5000/Math.max(1,rate)));
  const req=+(base*factor).toFixed(2);
  const approverRole={WORK_ORDER_DRAFT:"auto",LOTO_PHYSICAL:"maintenance_lead",RECIPE_CHANGE:"quality_process_eng",LINE_RESTART:"shift_supervisor",PARTS_RESERVE:"maintenance_planner"}[risk];
  const esign=["LOTO_PHYSICAL","RECIPE_CHANGE","LINE_RESTART"].includes(risk);
  if(!(safetyPass&&verPass))return{risk_class:risk,approver_role:approverRole,e_sign:esign,required_confidence:req,actual_confidence:conf,outcome:"REJECTED",rationale:"safety/verifier gate not passed"};
  if(conf<req)return{risk_class:risk,approver_role:approverRole,e_sign:esign,required_confidence:req,actual_confidence:conf,outcome:"REJECTED",rationale:`confidence ${conf} < required ${req} (economics-routed)`};
  if(approverRole==="auto")return{risk_class:risk,approver_role:"auto",e_sign:false,required_confidence:req,actual_confidence:conf,outcome:"APPROVED",rationale:"low-risk auto-approval (logged)"};
  return{risk_class:risk,approver_role:approverRole,e_sign:esign,required_confidence:req,actual_confidence:conf,outcome:autoApprove?"APPROVED":"PENDING",rationale:autoApprove?`${approverRole} approved (e-sign)`:"awaiting role-matched human approval"};
}

function audit(entries){const GEN="0".repeat(14);let prev=GEN;const out=[];
  entries.forEach((e,i)=>{const body=JSON.stringify({seq:i,kind:e.kind,body:e.body,prev});const h=cyrb53(body);out.push({seq:i,kind:e.kind,hash:h,prev,body:e.body});prev=h;});return out;}

function run(KB,{hint,alarm,line,rate,autoApprove=true}){
  _eid=0;
  const A=[{kind:"intake",body:{asset_hint:hint,alarm_code:alarm,line,downtime_rate_per_hr:rate}}];
  const res=resolveAsset(KB,hint,line);
  const trace=[];
  if(!res){A.push({kind:"abstain_escalate",body:{reason:"asset could not be resolved"}});
    trace.push(`DECISION: ABSTAIN (early) -> asset could not be resolved from '${hint}'/'${line}'`);
    return {decision:"ABSTAIN",steps:[],framework:"in-browser-stategraph",reasoning_engine:"offline-deterministic-inference (in-browser)",tool_policy:"n/a",tools_called:[],
      escalation:{reason:`asset could not be resolved from '${hint}'/'${line}'`,to:"senior maintenance / OEM"},
      audit:audit(A),trace,evidence_items:[],hypotheses:[],contradictions:[],router_usage:{total_calls:0,total_tokens:0,total_cost_usd:0,providers_used:["in-browser"],by_problem_type:{}},evidence_summary:{n_items:0,n_contradictions:0,sources:[]},work_package:null};}
  const a=res.asset;
  let plan=null,ver=null,saf=null,gd=null,it=[];
  A.push({kind:"resolve_asset",body:{funcloc:a.funcloc,confidence:res.conf}});
  const prelim=(KB.manuals[a.model]&&alarm==="A-220")?"Nozzle clog":"unknown";
  trace.push(`fast_path: preliminary cause '${prelim}' from alarm+manual`);
  // agentic loop
  const tools=makeTools(KB,a); const graph=[]; const called=new Set(); const steps=[];
  const nowt=()=>new Date().toLocaleTimeString("en-GB",{hour12:false});
  for(let step=0;step<12;step++){const d=policy(called,graph);
    if(d.action==="diagnose"){trace.push(`agent[heuristic-offline]: decided to DIAGNOSE — ${d.why}`);
      steps.push({action:"diagnose",label:"Generate Recommendations",source:"Triage Agent Reasoning",why:d.why,ms:0,count:0,sample:"Evaluating root causes and actions; building outcome packet",status:"completed",ts:nowt()});break;}
    const t0=(typeof performance!=="undefined"?performance.now():Date.now());
    const items=tools[d.action]?tools[d.action]():[]; const ms=Math.max(1,Math.round(((typeof performance!=="undefined"?performance.now():Date.now())-t0)*100)/100);
    called.add(d.action); items.forEach(it=>graph.push(it));
    const lab=STEP_LABELS[d.action]||[d.action,""];
    steps.push({action:d.action,label:lab[0],source:lab[1],why:d.why,ms,count:items.length,
      sample:items[0]?items[0].claim:"no new evidence",status:"completed",ts:nowt(),
      evidence_ids:items.map(it=>it.evidence_id)});
    trace.push(`agent[heuristic-offline] → ${d.action}() :: +${items.length} cited fact(s)${items[0]?": "+items[0].claim.slice(0,80):""}  [why: ${d.why}]`);}
  A.push({kind:"agentic_gather",body:{policy:"heuristic-offline",tools_called:[...called]}});
  const hyps=diagnose(graph,[]);
  A.push({kind:"diagnose",body:hyps.map(h=>({cause:h.cause,confidence:h.confidence}))});
  trace.push(`hypothesis: offline weighted-inference -> ${hyps.map(h=>"("+h.cause+", "+h.confidence+")").join(", ")}`);
  const top=hyps[0];
  const contradictions=graph.filter(e=>e.tags&&e.tags.conflict).map(e=>({note:e.claim}));
  if(top.confidence<TAU){A.push({kind:"abstain_escalate",body:{reason:`top confidence ${top.confidence} < tau ${TAU}`}});
    trace.push(`DECISION: ABSTAIN -> escalate (top confidence ${top.confidence} < tau ${TAU})`);
    return finish("ABSTAIN",{escalation:{reason:`top confidence ${top.confidence} < ${TAU}`,to:"senior maintenance / OEM"}});}
  // plan + verify (catch hallucination, replan)
  plan=buildPlan(KB,a,true); ver=verify(KB,a,plan);
  A.push({kind:"verify",body:ver});
  if(!ver.passed){trace.push(`verifier: REFUTED -> ${ver.refutations.join("; ")}; re-planning (inner loop)`);
    plan=buildPlan(KB,a,false); ver=verify(KB,a,plan); A.push({kind:"verify_retry",body:ver});}
  if(!ver.passed){A.push({kind:"abstain_escalate",body:{reason:"verifier could not ground the plan"}});
    trace.push("DECISION: ABSTAIN -> verifier could not ground the plan");
    return finish("ABSTAIN",{escalation:{reason:"verifier could not ground a cited procedure for this asset",to:"senior maintenance / OEM"}});}
  saf=safetyCheck(a,plan); A.push({kind:"safety_precheck",body:saf});
  gd=gate(plan.risk,top.confidence,rate,saf.passed,ver.passed,autoApprove); A.push({kind:"gate",body:gd});
  if(gd.outcome==="APPROVED"){
    const mk=(sys,act,parts)=>({system:sys,action:act,idempotency_key:cyrb53(a.funcloc+act+JSON.stringify(parts||"")).slice(0,12),created:true});
    it.push(mk("CMMS","create_work_order")); if(plan.parts.length)it.push(mk("ERP","reserve_parts",plan.parts));
    it.push(mk("QMS","create_qc_plan")); it.push(mk("NOTIFY","notify"));
    it.forEach(x=>A.push({kind:"it_action",body:x}));
    A.push({kind:"monitor",body:{fix_confirmed:true,note:"post-CIP flow back in 36-40 band per manual acceptance"}});
    A.push({kind:"learn",body:{known_fix:`${top.cause} on ${a.funcloc} -> CIP + 8200-NZ per §7.4`}});}
  function finish(decision,extra){
    const value=+(((90-plan?.est_minutes||45)/60)*rate).toFixed(2);
    const econ=plan?{downtime_rate_per_hr:rate,mttr_baseline_min:90,mttr_agent_min:plan.est_minutes,value_per_event_usd:+(((90-plan.est_minutes)/60)*rate).toFixed(2),agent_cost_usd:0,p_wrong_acted:"driven->0 via grounding+verify+gate"}:{};
    const wp=decision==="ACT"?{
      incident_id:"INC-"+cyrb53(hint+alarm).slice(0,8),asset_funcloc:a.funcloc,
      likely_cause:top,evidence_trail:top.supporting,
      safe_checks:plan.steps.filter(s=>s.loto_required).map(s=>s.text),
      troubleshooting_path:plan.steps,
      work_order_draft:{funcloc:a.funcloc,cause:top.cause,iso14224:top.iso14224_code,risk:plan.risk,est_minutes:plan.est_minutes,techs:plan.techs},
      parts_request:plan.parts.map(p=>({part_no:p.part_no,desc:p.desc,on_hand:p.on_hand,bin:p.bin})),
      qc_sampling_plan:{aql:2.5,n:5,check:"fill volume post-restart"},
      restart_readiness:["LOTO removed","CIP complete","flow 36-40 L/min verified","QC sample pass","supervisor sign-off"],
      shift_handover:`${a.funcloc} ${alarm}: likely ${top.cause} (conf ${top.confidence}). Plan grounded to Manual ${a.model} §7.4. Verifier PASS, safety PASS.`,
      confidence:top.confidence,economics:econ}:null;
    const sources=[...new Set(graph.map(e=>e.source_system))].sort();
    return Object.assign({decision,steps:typeof steps!=="undefined"?steps:[],framework:"in-browser-stategraph",
      reasoning_engine:"offline-deterministic-inference (in-browser)",tool_policy:"heuristic-offline",
      tools_called:[...called],trace,preliminary_cause:prelim,
      work_package:wp,hypotheses:hyps,contradictions,verifier:ver,safety:saf,gate:gd,it_actions:it,
      evidence_items:graph,audit:audit(A),
      router_usage:{total_calls:0,total_tokens:0,total_cost_usd:0,providers_used:["in-browser-deterministic"],by_problem_type:{}},
      evidence_summary:{n_items:graph.length,n_contradictions:contradictions.length,sources}},extra||{});}
  return finish("ACT",{});
}


return {run, resolveAsset};
})();
</script>
<script type="text/babel" data-presets="react">
const { useReducer, useContext, createContext, useEffect, useRef, useState } = React;
const ICONS = {}; // lucide rendered via data attrs

function Icon({ n, className }) {
  return <i data-lucide={n} className={className}></i>;
}
function useLucide(dep) {
  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
}

// ---- map an engine RunResult into the workbench view model ----
function buildSteps(run) {
  if (run.steps && run.steps.length) return run.steps;
  // fallback: derive from trace (when result came from the Python backend)
  const out = [];
  (run.trace || []).forEach(t => {
    const m = t.match(/→ (\w+)\(.*?\) :: \+(\d+) cited fact\(s\)(?::\s*(.*?))?\s*\[why: (.*?)\]/);
    if (m) out.push({ action: m[1], label: m[1], source: "", why: m[4], ms: 1, count: +m[2], sample: m[3] || "", status: "completed", ts: "" });
    else if (/DIAGNOSE/.test(t)) out.push({ action: "diagnose", label: "Generate Recommendations", source: "Triage Agent Reasoning", why: t, ms: 0, count: 0, sample: "Building outcome packet", status: "completed", ts: "" });
  });
  return out;
}
function rootCauses(run) {
  return (run.hypotheses || []).map(h => ({ cause: h.cause, weight: h.confidence, iso: h.iso14224_code, supporting: (h.supporting || []).length, falsifier: h.would_change_my_mind }));
}
function safeActions(run) {
  if (run.decision !== "ACT" || !run.work_package) return [];
  const wp = run.work_package;
  const acts = (wp.troubleshooting_path || []).map(s => ({ text: s.text, loto: s.loto_required, cite: (s.citation || {}).locator }));
  return acts.length ? acts : (wp.safe_checks || []).map(t => ({ text: t, loto: true }));
}

const initialAgentState = {
  status: "idle", goal: "Line 3 filler down (alarm A-220) — get me a safe fix and prep handoff.",
  hint: "Line 3 filler", alarm: "A-220", rate: 10000, line: "Line 3",
  run: null, steps: [], revealed: 0, autoProgress: true,
  notes: "", handoff: "", woStatus: "In Progress", woPriority: "High",
  events: [], evidenceOpen: null, command: "",
};

function reducer(s, a) {
  switch (a.type) {
    case "RUN_START": return { ...s, status: "running", run: null, steps: [], revealed: 0, events: [{ ts: now(), asset: a.line + " / agent", event: "Investigation started", sev: "Info", src: "Agent" }] };
    case "RUN_RESULT": {
      const steps = buildSteps(a.run);
      const wp = a.run.work_package;
      return { ...s, status: "done", run: a.run, steps, revealed: s.autoProgress ? 0 : steps.length,
        handoff: wp ? wp.shift_handover : (a.run.escalation ? "ESCALATED: " + a.run.escalation.reason : ""),
        events: stepEvents(steps, a.line).concat(s.events) };
    }
    case "REVEAL": return { ...s, revealed: Math.min(s.steps.length, a.n != null ? a.n : s.revealed + 1) };
    case "AUTOPROGRESS": return { ...s, autoProgress: a.v, revealed: a.v ? s.revealed : s.steps.length };
    case "SET": return { ...s, [a.k]: a.v };
    case "OPEN_EV": return { ...s, evidenceOpen: a.ev };
    case "CLOSE_EV": return { ...s, evidenceOpen: null };
    default: return s;
  }
}
function now() { return new Date().toLocaleTimeString("en-GB", { hour12: false }); }
function stepEvents(steps, line) {
  return steps.filter(s => s.action !== "diagnose").map(s => ({ ts: s.ts, asset: line, event: s.label + " — +" + s.count + " facts", sev: "Info", src: s.source }));
}

const Ctx = createContext(null);

function App() {
  const [s, dispatch] = useReducer(reducer, initialAgentState);
  useLucide([s]);

  async function runAgent(over = {}) {
    const hint = over.hint ?? s.hint, alarm = over.alarm ?? s.alarm, rate = over.rate ?? s.rate;
    const line = (hint.match(/line\s*(\d+)/i) ? "Line " + hint.match(/line\s*(\d+)/i)[1] : s.line);
    dispatch({ type: "RUN_START", line });
    let run = null;
    // 1) try live backend (when served by `make serve`) — same origin
    try {
      if (location.protocol.startsWith("http")) {
        const r = await fetch("/api/run", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ hint, alarm, line, rate, auto_approve: true }) });
        if (r.ok) run = await r.json();
      }
    } catch (e) { /* fall back */ }
    // 2) fall back to the real in-browser engine
    if (!run) run = window.ENGINE.run(window.KB, { hint, alarm, line, rate, autoApprove: true });
    dispatch({ type: "RUN_RESULT", run, line });
  }
  useEffect(() => { runAgent(); /* auto-run once on load */ }, []);

  // auto-progress reveal
  useEffect(() => {
    if (s.status === "done" && s.autoProgress && s.revealed < s.steps.length) {
      const t = setTimeout(() => dispatch({ type: "REVEAL" }), 650);
      return () => clearTimeout(t);
    }
  }, [s.status, s.autoProgress, s.revealed, s.steps.length]);

  return (
    <Ctx.Provider value={{ s, dispatch, runAgent }}>
      <div className="flex h-screen bg-slate-100 text-slate-800 text-[13px]">
        <Sidebar />
        <div className="flex-1 flex flex-col min-w-0">
          <TopBar />
          <div className="flex-1 grid grid-cols-12 gap-3 p-3 overflow-auto">
            <div className="col-span-3 min-w-0"><LeftPanel /></div>
            <div className="col-span-5 min-w-0"><CenterPanel /></div>
            <div className="col-span-4 min-w-0"><RightPanel /></div>
            <div className="col-span-12"><BottomBar /></div>
          </div>
        </div>
        {s.evidenceOpen && <EvidenceModal />}
      </div>
    </Ctx.Provider>
  );
}

function Sidebar() {
  const items = [["Workbench", "layout-dashboard", true], ["Assets", "cpu"], ["Library", "book-open"], ["Work Orders", "clipboard-list"], ["Handoffs", "git-pull-request"], ["Reports", "bar-chart-3"], ["Alerts", "bell"], ["Settings", "settings"]];
  return (

  return e.claim;
}

        <div className="text-[11px] text-slate-400 mt-1">Goal Progress</div>
        <div className="w-full h-2 bg-slate-100 rounded mt-1"><div className="h-2 bg-blue-500 rounded" style={{ width: progress + "%" }} /></div>
        <div className="text-[11px] text-slate-500 mt-0.5">{progress}%</div>
      </div>
      <div className="col-span-2 bg-white border border-slate-200 rounded-xl p-3">
        <div className="text-[11px] font-bold uppercase text-slate-500 mb-2">Connectivity</div>
        {conn.map(([label, sys]) => <div key={label} className="flex items-center justify-between text-[11px] py-0.5"><span className="text-slate-500">{label}</span><span className={"flex items-center gap-1 " + (used.has(sys) ? "text-emerald-600" : "text-slate-400")}><span className={"w-1.5 h-1.5 rounded-full " + (used.has(sys) ? "bg-emerald-500" : "bg-slate-300")} />{used.has(sys) ? "Connected" : "Idle"}</span></div>)}
      </div>
      <div className="col-span-3 bg-white border border-slate-200 rounded-xl p-3 flex flex-col">
        <div className="text-[11px] font-bold uppercase text-slate-500 mb-2">Chat / Command</div>
        <CommandBar />
      </div>
    </div>
  );
}
function CommandBar() {
  const { s, dispatch, runAgent } = useContext(Ctx);
  const [v, setV] = useState("");
  const [log, setLog] = useState([]);
  function submit() {
    if (!v.trim()) return;
    const cmd = v.trim(); const lc = cmd.toLowerCase(); let resp = "";
    const over = {};
    const mRate = lc.match(/rate\s*\$?(\d+)/); if (mRate) over.rate = +mRate[1];
    const mLine = lc.match(/line\s*(\d+)\s*(filler|capper|conveyor)?/); if (mLine) over.hint = "Line " + mLine[1] + " " + (mLine[2] || "filler");
    if (lc.includes("unknown") || lc.includes("ghost")) { over.hint = "ghost xyz"; over.alarm = ""; }
    const mAlarm = lc.match(/alarm\s*([a-z0-9-]+)/i); if (mAlarm) over.alarm = mAlarm[1].toUpperCase();
    if (Object.keys(over).length) { resp = "Re-evaluating: " + JSON.stringify(over); runAgent(over); if (over.hint) dispatch({ type: "SET", k: "hint", v: over.hint }); if (over.rate) dispatch({ type: "SET", k: "rate", v: over.rate }); if (over.alarm !== undefined) dispatch({ type: "SET", k: "alarm", v: over.alarm }); }
    else if (lc.includes("re-evaluate") || lc.includes("rerun") || lc.includes("re-run")) { resp = "Re-running the agent over current evidence…"; runAgent(); }
    else resp = "Commands: 'rate 50000' · 'line 2 filler' · 'alarm A-220' · 'unknown asset' · 're-evaluate'.";
    setLog(l => [{ cmd, resp }, ...l].slice(0, 4)); setV("");
  }
  return (
    <div className="flex-1 flex flex-col">
      <div className="flex-1 text-[11px] text-slate-500 overflow-auto mb-1">{log.map((l, i) => <div key={i} className="mb-1"><div className="text-slate-700">$ {l.cmd}</div><div className="text-slate-400">{l.resp}</div></div>)}</div>
      <div className="flex gap-1">
        <input className="flex-1 border border-slate-200 rounded px-2 py-1 text-[11px] font-mono" placeholder="Ask the agent or issue a command…" value={v} onChange={e => setV(e.target.value)} onKeyDown={e => e.key === "Enter" && submit()} />
        <button className="bg-slate-900 text-white rounded px-2 text-[11px]" onClick={submit}><Icon n="send" className="w-3.5 h-3.5" /></button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body></html>
