# fly.toml — Fly.io deployment config for RestartOS
#
# Free-tier shape: 1 shared-cpu-1x VM with 1 GB RAM (engine only).
# Qdrant + Postgres run as separate Fly apps in the same org so they
# get private-network DNS (qdrant.internal, postgres.internal).
#
# Deploy:
#   flyctl auth login                    # one-time, opens browser
#   flyctl launch --no-deploy --copy-config   # creates the app
#   flyctl secrets set NIM_API_KEY=... GROQ_API_KEY=...
#   flyctl deploy                        # builds Docker, pushes, releases

app           = "restartos-mvp"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  # Engine binds to 0.0.0.0:8000 inside the container; Fly proxies HTTPS at :443
  QDRANT_URL  = "http://restartos-qdrant.internal:6333"
  POSTGRES_URL = "postgresql://restartos:restartos@restartos-postgres.flycast:5432/restartos"
  RESTARTOS_DEMO_REPLAN = "0"

[http_service]
  internal_port = 8000
  force_https   = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0     # scales to zero when idle (free tier)
  processes            = ["app"]

  [[http_service.checks]]
    grace_period  = "30s"
    interval      = "15s"
    method        = "GET"
    path          = "/healthz"
    protocol      = "http"
    timeout       = "5s"
    tls_skip_verify = false

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory_mb = 1024

# IMPORTANT: this single-app config assumes you've already created
# the qdrant + postgres companion apps:
#
#   flyctl apps create restartos-qdrant
#   flyctl deploy --image qdrant/qdrant:v1.12.4 --app restartos-qdrant \
#       --internal-port 6333 --vm-memory 512
#
#   flyctl postgres create --name restartos-postgres --region iad --vm-size shared-cpu-1x
#
# Then attach the Postgres app:
#   flyctl postgres attach --app restartos-mvp restartos-postgres
