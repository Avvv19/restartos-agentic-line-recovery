name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest + ruff
    runs-on: ubuntu-latest

    services:
      qdrant:
        image: qdrant/qdrant:v1.12.4
        ports:
          - 6333:6333
        options: >-
          --health-cmd "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: restartos
          POSTGRES_PASSWORD: restartos
          POSTGRES_DB: restartos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U restartos -d restartos"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint (ruff)
        run: ruff check restartos/ tests/ || true   # advisory for now; tighten in a follow-up

      - name: Run dataset generator (needed for some tests)
        run: python dataset/generate.py

      - name: Run tests
        env:
          QDRANT_URL: http://localhost:6333
          POSTGRES_URL: postgresql://restartos:restartos@localhost:5432/restartos
          PYTHONPATH: ${{ github.workspace }}
          PYTHONIOENCODING: utf-8
        run: pytest -q

  docker-build:
    name: docker build smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: restartos-engine:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
