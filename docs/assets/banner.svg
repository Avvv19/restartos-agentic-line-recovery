<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 380" role="img" aria-label="Restart OS banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1c"/>
      <stop offset="55%" stop-color="#0f1730"/>
      <stop offset="100%" stop-color="#04060d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2244" stroke-width="0.5"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1400" height="380" fill="url(#bg)"/>
  <rect width="1400" height="380" fill="url(#grid)"/>
  <!-- ambient accent glow -->
  <circle cx="1180" cy="80" r="180" fill="#6366f1" opacity="0.08"/>
  <circle cx="120" cy="320" r="160" fill="#22d3ee" opacity="0.07"/>

  <!-- Logo mark: hex with a restart arrow -->
  <g transform="translate(60,90)">
    <polygon points="50,5 95,30 95,80 50,105 5,80 5,30"
             fill="none" stroke="url(#accent)" stroke-width="3" filter="url(#glow)"/>
    <path d="M 30,55 A 22 22 0 1 1 55,82" fill="none"
          stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round"/>
    <polygon points="55,82 65,72 60,86" fill="#a855f7"/>
  </g>

  <!-- Wordmark -->
  <text x="170" y="135" font-family="-apple-system, Segoe UI, Roboto, sans-serif"
        font-weight="700" font-size="60" fill="#f8fafc"
        letter-spacing="-1.5">Restart OS</text>
  <text x="170" y="170" font-family="ui-monospace, SF Mono, Consolas, monospace"
        font-size="15" fill="#94a3b8" letter-spacing="3">AGENTIC LINE-RECOVERY FOR MANUFACTURING</text>

  <!-- Tagline -->
  <text x="170" y="215" font-family="-apple-system, Segoe UI, Roboto, sans-serif"
        font-size="22" fill="#cbd5e1">When the line goes down, an agent — not a person —</text>
  <text x="170" y="245" font-family="-apple-system, Segoe UI, Roboto, sans-serif"
        font-size="22" fill="#cbd5e1">drafts the verified Recovery Work Package.</text>

  <!-- Status pills -->
  <g transform="translate(170,275)" font-family="ui-monospace, monospace" font-size="13">
    <g>
      <rect x="0" y="0" width="155" height="32" rx="16" fill="#0b1730" stroke="#1f2a4a"/>
      <circle cx="14" cy="16" r="4" fill="url(#ok)"/>
      <text x="26" y="20" fill="#86efac">4 agents · cross-model</text>
    </g>
    <g transform="translate(170,0)">
      <rect x="0" y="0" width="155" height="32" rx="16" fill="#0b1730" stroke="#1f2a4a"/>
      <circle cx="14" cy="16" r="4" fill="url(#ok)"/>
      <text x="26" y="20" fill="#86efac">Qdrant RAG · live</text>
    </g>
    <g transform="translate(340,0)">
      <rect x="0" y="0" width="180" height="32" rx="16" fill="#0b1730" stroke="#1f2a4a"/>
      <circle cx="14" cy="16" r="4" fill="url(#ok)"/>
      <text x="26" y="20" fill="#86efac">Postgres memory · live</text>
    </g>
    <g transform="translate(535,0)">
      <rect x="0" y="0" width="170" height="32" rx="16" fill="#0b1730" stroke="#1f2a4a"/>
      <circle cx="14" cy="16" r="4" fill="url(#warn)"/>
      <text x="26" y="20" fill="#fde68a">52% abstention rate</text>
    </g>
  </g>

  <!-- Right side: schematic of the flow -->
  <g transform="translate(880,55)" font-family="ui-monospace, monospace" font-size="11.5" fill="#94a3b8">
    <!-- Source box -->
    <rect x="0" y="0" width="170" height="56" rx="6" fill="#0b1730" stroke="#22d3ee" stroke-width="1.2"/>
    <text x="14" y="22" fill="#67e8f9" font-weight="700">PLC ALARM</text>
    <text x="14" y="42" fill="#cbd5e1">A-220 · FL-PKG-03-FILL</text>

    <!-- arrow -->
    <line x1="170" y1="28" x2="200" y2="28" stroke="#6366f1" stroke-width="1.8" marker-end="url(#arrow)"/>

    <!-- Engine box -->
    <rect x="200" y="0" width="190" height="56" rx="6" fill="#0b1730" stroke="url(#accent)" stroke-width="1.4"/>
    <text x="214" y="22" fill="#c4b5fd" font-weight="700">RESTART OS ENGINE</text>
    <text x="214" y="42" fill="#cbd5e1">9 tools · verify · abstain</text>

    <!-- arrow down -->
    <line x1="295" y1="56" x2="295" y2="84" stroke="#6366f1" stroke-width="1.8" marker-end="url(#arrow)"/>

    <!-- Outcome -->
    <rect x="200" y="86" width="190" height="56" rx="6" fill="#0b1730" stroke="#34d399" stroke-width="1.4"/>
    <text x="214" y="108" fill="#86efac" font-weight="700">WORK ORDER</text>
    <text x="214" y="128" fill="#cbd5e1">WO + parts + tech + QC</text>

    <!-- arrow down -->
    <line x1="295" y1="142" x2="295" y2="170" stroke="#6366f1" stroke-width="1.8" marker-end="url(#arrow)"/>

    <!-- Human gate -->
    <rect x="200" y="172" width="190" height="56" rx="6" fill="#0b1730" stroke="#fbbf24" stroke-width="1.4"/>
    <text x="214" y="194" fill="#fcd34d" font-weight="700">HUMAN APPROVE</text>
    <text x="214" y="214" fill="#cbd5e1">e-sign · LOTO check</text>

    <!-- arrow down -->
    <line x1="295" y1="228" x2="295" y2="256" stroke="#6366f1" stroke-width="1.8" marker-end="url(#arrow)"/>

    <!-- Floor -->
    <rect x="200" y="258" width="190" height="40" rx="6" fill="#0b1730" stroke="#22d3ee" stroke-width="1.2"/>
    <text x="214" y="283" fill="#67e8f9" font-weight="700">FACTORY FLOOR</text>

    <!-- Lateral: tools -->
    <g transform="translate(0,80)">
      <rect x="0" y="0" width="170" height="170" rx="6" fill="#0b1730" stroke="#1f2a4a"/>
      <text x="14" y="18" fill="#94a3b8" letter-spacing="2" font-size="10">TYPED TOOLS</text>
      <text x="14" y="38" fill="#cbd5e1">read_timeline</text>
      <text x="14" y="56" fill="#cbd5e1">read_maintenance_history</text>
      <text x="14" y="74" fill="#cbd5e1">search_manual  →  Qdrant</text>
      <text x="14" y="92" fill="#cbd5e1">check_parts</text>
      <text x="14" y="110" fill="#cbd5e1">check_safety_loto</text>
      <text x="14" y="128" fill="#cbd5e1">check_labor  →  HRIS</text>
      <text x="14" y="146" fill="#cbd5e1">search_shift_notes</text>
      <text x="14" y="164" fill="#cbd5e1">read_production_econ</text>
    </g>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6366f1"/>
    </marker>
  </defs>
</svg>
